<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multisite Portal | Italian & Barber</title>
    <link rel="stylesheet" href="portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="portal-container">
        <!-- Italian Restaurant Side -->
        <section class="portal-side restaurant" id="side-restaurant">
            <div class="side-content">
                <h2 class="side-title">Italiana Food</h2>
                <p class="side-subtitle">Autêntica Culinária Italiana</p>
                <a href="restaurant/index.html" class="portal-btn btn-restaurant">Entrar na Experiência</a>
            </div>
            <div class="side-overlay"></div>
        </section>

        <!-- Barbershop Side -->
        <section class="portal-side barber" id="side-barber">
            <div class="side-content">
                <h2 class="side-title">Barbearia Telasco</h2>
                <p class="side-subtitle">Cuidado e Estilo Masculino</p>
                <a href="barber/index.html" class="portal-btn btn-barber">Entrar na Barbearia</a>
            </div>
            <div class="side-overlay"></div>
        </section>
    </main>
    <script src="portal.js"></script>
</body>
</html>
